<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng ký tài khoản</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="../css/register.css" />
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  </head>
  <body>
    <div class="register-container">
      <h2>Đăng ký tài khoản</h2>
      <p class="subtitle">Đăng ký tài khoản để sử dụng dịch vụ</p>

      <form id="registerForm" novalidate>
        <div class="form-row">
          <div class="form-group">
            <label for="hoDem">Họ và tên đệm</label>
            <input type="text" id="hoDem" placeholder="" />
            <div class="error-message" id="error-hoDem">
              Vui lòng nhập họ và tên đệm.
            </div>
          </div>
          <div class="form-group">
            <label for="ten">Tên</label>
            <input type="text" id="ten" placeholder="" />
            <div class="error-message" id="error-ten">Vui lòng nhập tên.</div>
          </div>
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="you@company.com" />
          <div class="error-message" id="error-email">
            Vui lòng nhập địa chỉ email hợp lệ.
          </div>
        </div>

        <div class="form-group">
          <label for="password">Mật khẩu</label>
          <input type="password" id="password" placeholder="" />
          <div class="error-message" id="error-password">
            Mật khẩu phải có ít nhất 8 ký tự.
          </div>
        </div>

        <div class="form-group">
          <label for="confirmPassword">Xác nhận mật khẩu</label>
          <input type="password" id="confirmPassword" placeholder="" />
          <div class="error-message" id="error-confirmPassword">
            Mật khẩu xác nhận không khớp.
          </div>
        </div>

        <div class="checkbox-group">
          <input type="checkbox" id="terms" />
          <label for="terms"
            >Bạn đồng ý với <a href="#">chính sách và điều khoản</a></label
          >
        </div>
        <div
          class="error-message"
          id="error-terms"
          style="margin-top: -15px; margin-bottom: 15px"
        >
          Bạn cần đồng ý với điều khoản dịch vụ.
        </div>

        <button type="submit" class="btn-submit">Đăng ký</button>

        <p class="footer-text">
          Bạn đã có tài khoản? <a href="#">Đăng nhập</a>
        </p>
      </form>
    </div>

    <script src="../js/register.js"></script>
  </body>
</html>
